<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odisse — Orçamentos</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ================= APP ================= -->
<div id="app" class="app" hidden>

  <header class="topbar">
    <div class="topbar__mark">ODISSE</div>
    <nav class="topbar__nav-center">
      <a href="index.html" class="is-current">Orçamentos</a>
      <a href="historico.html">Histórico</a>
      <a href="cub.html">CUB</a>
    </nav>
    <div class="topbar__meta">
      <span id="rail-user"></span>
      <a class="rail__reset" href="login.html" id="btn-logout">Sair</a>
    </div>
  </header>

  <nav class="sidebar">
    <div class="sidebar__steps" id="sidebar-steps"></div>
    <div class="sidebar__ticket" id="ticket">
      <div class="ticket__block">
        <span class="ticket__label">Honorário estimado</span>
        <span class="ticket__value" id="ticket-total">R$ 0,00</span>
      </div>
      <div class="ticket__block">
        <span class="ticket__label">Prazo total</span>
        <span class="ticket__value ticket__value--small" id="ticket-prazo-duracao">—</span>
        <span class="ticket__value ticket__value--dates" id="ticket-prazo-datas"></span>
      </div>
      <div class="ticket__sub" id="ticket-sub">Preencha a classificação do serviço para iniciar o cálculo</div>
      <div class="ticket__nav">
        <button class="btn btn--primary" id="btn-next" type="button">Continuar</button>
        <button class="btn btn--ghost" id="btn-prev" type="button">Voltar</button>
        <button class="btn btn--ghost" id="btn-reset" type="button">Recomeçar</button>
      </div>
    </div>
  </nav>

  <main class="stage">
    <div class="stage__col" id="step-container"></div>
  </main>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<script>exigirAutenticacao();</script>
<script src="data-loader.js"></script>
<script src="store.js"></script>
<script src="calc.js"></script>
<script src="pdf.js"></script>
<script src="steps.js"></script>
<script src="app.js"></script>
</body>
</html>
