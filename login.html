<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odisse — Acesso</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="gate-body">

<div class="gate">
  <div class="gate__card">
    <div class="gate__mark gate__mark--center">ODISSE</div>
    <form id="gate-form" autocomplete="off">
      <label class="gate__field">
        <span>Senha de acesso</span>
        <input type="password" id="gate-password" required autofocus>
      </label>
      <label class="gate__field">
        <span>Seu nome</span>
        <input type="text" id="gate-name" placeholder="Quem está preenchendo" required>
      </label>
      <button type="submit" class="btn btn--primary">Entrar</button>
      <p class="gate__error" id="gate-error" hidden>Senha incorreta. Tente novamente.</p>
    </form>
    <p class="gate__note">Acesso restrito à equipe Odisse.</p>
  </div>
</div>

<script src="config.js"></script>
<script src="auth.js"></script>
<script>
  if (isAuthenticated()) window.location.href = 'index.html';

  document.getElementById('gate-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pass = document.getElementById('gate-password').value;
    const name = document.getElementById('gate-name').value.trim();
    const hash = await sha256(pass);
    const errEl = document.getElementById('gate-error');

    if (hash !== CONFIG.passwordHash) {
      errEl.hidden = false;
      return;
    }
    errEl.hidden = true;
    setAuthenticated(name);
    window.location.href = 'index.html';
  });
</script>
</body>
</html>
